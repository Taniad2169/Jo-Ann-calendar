<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jo-Ann's Intake - Referral Form</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }
        
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(135deg, #faf602 0%, #f5f1ed 50%, #70410a 100%);
            position: relative;
            overflow-x: hidden;
        }
        
        /* Spotlight Effect */
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 40%, rgba(250, 246, 2, 0.3) 0%, transparent 50%),
                        radial-gradient(circle at 70% 60%, rgba(245, 241, 237, 0.3) 0%, transparent 50%),
                        radial-gradient(circle at 40% 70%, rgba(112, 65, 10, 0.2) 0%, transparent 50%);
            animation: spotlight 15s infinite alternate;
            pointer-events: none;
            z-index: 0;
        }
        
        @keyframes spotlight {
            0% {
                transform: translate(0, 0) rotate(0deg);
                opacity: 0.5;
            }
            50% {
                transform: translate(-5%, -5%) rotate(2deg);
                opacity: 0.8;
            }
            100% {
                transform: translate(5%, 5%) rotate(-2deg);
                opacity: 0.5;
            }
        }
        
        .form-container {
            width: 100%;
            max-width: 800px;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(112, 65, 10, 0.3),
                        0 0 0 2px rgba(250, 246, 2, 0.3),
                        0 0 20px rgba(250, 246, 2, 0.2);
            position: relative;
            z-index: 1;
            border: 1px solid rgba(250, 246, 2, 0.3);
        }
        
        /* Decorative spotlight effect on form */
        .form-container::after {
            content: '';
            position: absolute;
            top: -20px;
            left: -20px;
            right: -20px;
            bottom: -20px;
            background: radial-gradient(circle at 30% 30%, rgba(250, 246, 2, 0.1) 0%, transparent 60%),
                        radial-gradient(circle at 70% 70%, rgba(112, 65, 10, 0.1) 0%, transparent 60%);
            border-radius: 50px;
            z-index: -1;
            pointer-events: none;
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #70410a 0%, #faf602 50%, #70410a 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
            font-weight: 800;
            letter-spacing: 1px;
            text-shadow: 2px 2px 4px rgba(250, 246, 2, 0.2);
        }
        
        .subtitle {
            text-align: center;
            color: #70410a;
            margin-bottom: 30px;
            font-size: 1.1rem;
            border-bottom: 2px solid #faf602;
            padding-bottom: 15px;
            font-weight: 500;
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group.full-width {
            grid-column: span 2;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #70410a;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
        }
        
        label i {
            color: #faf602;
            margin-right: 5px;
            text-shadow: 0 0 5px rgba(250, 246, 2, 0.5);
        }
        
        input, select, textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid rgba(112, 65, 10, 0.2);
            border-radius: 15px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
        }
        
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #faf602;
            box-shadow: 0 0 15px rgba(250, 246, 2, 0.4);
            background: white;
        }
        
        input:hover, select:hover, textarea:hover {
            border-color: #70410a;
        }
        
        select {
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2370410a' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 15px center;
            background-size: 15px;
        }
        
        textarea {
            resize: vertical;
            min-height: 120px;
        }
        
        .radio-group {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            padding: 10px 0;
        }
        
        .radio-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: #70410a;
            font-weight: 500;
        }
        
        .radio-label input[type="radio"] {
            width: auto;
            accent-color: #faf602;
        }
        
        .button-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 30px;
        }
        
        .button-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .button-group.two-buttons {
            grid-template-columns: 1fr 1fr;
        }
        
        .action-button {
            flex: 1;
            min-width: 200px;
            padding: 18px 20px;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(250, 246, 2, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.5);
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: #70410a;
            background: linear-gradient(135deg, #f5f1ed, #faf602);
            text-shadow: 0 1px 2px rgba(255, 255, 255, 0.5);
        }
        
        .action-button i {
            font-size: 1.3rem;
            color: #70410a;
        }
        
        .action-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(250, 246, 2, 0.6);
            background: linear-gradient(135deg, #faf602, #f5f1ed);
        }
        
        .action-button.call-btn {
            background: linear-gradient(135deg, #70410a, #faf602);
            color: white;
        }
        
        .action-button.call-btn i {
            color: white;
        }
        
        .action-button.call-btn:hover {
            background: linear-gradient(135deg, #faf602, #70410a);
        }
        
        .button-label {
            text-align: center;
            margin-bottom: 5px;
            font-weight: 600;
            color: #70410a;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .required::after {
            content: '*';
            color: #faf602;
            margin-left: 4px;
            font-weight: bold;
        }
        
        /* Character count */
        .char-count {
            text-align: right;
            font-size: 0.85rem;
            color: #70410a;
            margin-top: 5px;
            opacity: 0.7;
        }
        
        /* Section dividers */
        .section-divider {
            display: flex;
            align-items: center;
            gap: 15px;
            margin: 25px 0 15px;
            color: #70410a;
        }
        
        .section-divider hr {
            flex: 1;
            border: none;
            border-top: 2px dashed #faf602;
        }
        
        .section-divider span {
            font-weight: 600;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: rgba(250, 246, 2, 0.2);
            padding: 5px 15px;
            border-radius: 50px;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .form-container {
                padding: 25px;
            }
            
            .form-grid {
                grid-template-columns: 1fr;
            }
            
            .form-group.full-width {
                grid-column: span 1;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .radio-group {
                flex-direction: column;
                gap: 10px;
            }
            
            .button-group {
                flex-direction: column;
            }
            
            .action-button {
                width: 100%;
                min-width: auto;
                padding: 15px;
            }
        }
        
        /* Referrer section highlight */
        .referrer-section {
            background: rgba(250, 246, 2, 0.1);
            padding: 20px;
            border-radius: 20px;
            margin: 20px 0;
            border: 1px dashed #faf602;
        }
        
        .referrer-section h3 {
            color: #70410a;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .referrer-section h3 i {
            color: #faf602;
            font-size: 1.3rem;
        }
        
        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #70410a;
            color: #faf602;
            padding: 15px 30px;
            border-radius: 50px;
            z-index: 9999;
            display: none;
            font-weight: 500;
            box-shadow: 0 5px 20px rgba(250, 246, 2, 0.4);
            border: 2px solid #faf602;
        }
        
        .toast.show {
            display: block;
            animation: slideUp 0.3s ease;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
        
        /* Decorative elements */
        .spotlight-dots {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        
        .spotlight-dots::before,
        .spotlight-dots::after {
            content: '';
            position: absolute;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(250, 246, 2, 0.1) 0%, transparent 70%);
            animation: float 10s infinite alternate;
        }
        
        .spotlight-dots::before {
            top: 10%;
            left: 5%;
        }
        
        .spotlight-dots::after {
            bottom: 10%;
            right: 5%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(112, 65, 10, 0.1) 0%, transparent 70%);
        }
        
        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, 30px) scale(1.2); }
        }
    </style>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="spotlight-dots"></div>
    
    <div class="form-container">
        <h1>✨ Jo-Ann's Intake ✨</h1>
        <div class="subtitle">Referral & Consultation Request</div>
        
        <form id="referralForm">
            <div class="form-grid">
                <!-- Name -->
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Full Name <span class="required"></span></label>
                    <input type="text" id="fullName" placeholder="John Doe" required>
                </div>
                
                <!-- Phone Number -->
                <div class="form-group">
                    <label><i class="fas fa-phone"></i> Phone Number <span class="required"></span></label>
                    <input type="tel" id="phoneNumber" placeholder="(555) 555-5555" required>
                </div>
                
                <!-- Company Name -->
                <div class="form-group">
                    <label><i class="fas fa-building"></i> Company Name</label>
                    <input type="text" id="companyName" placeholder="Your Business Name">
                </div>
                
                <!-- State Dropdown -->
                <div class="form-group">
                    <label><i class="fas fa-map-marker-alt"></i> State <span class="required"></span></label>
                    <select id="state" required>
                        <option value="" disabled selected>Select your state</option>
                        <option value="AL">Alabama</option>
                        <option value="AK">Alaska</option>
                        <option value="AZ">Arizona</option>
                        <option value="AR">Arkansas</option>
                        <option value="CA">California</option>
                        <option value="CO">Colorado</option>
                        <option value="CT">Connecticut</option>
                        <option value="DE">Delaware</option>
                        <option value="FL">Florida</option>
                        <option value="GA">Georgia</option>
                        <option value="HI">Hawaii</option>
                        <option value="ID">Idaho</option>
                        <option value="IL">Illinois</option>
                        <option value="IN">Indiana</option>
                        <option value="IA">Iowa</option>
                        <option value="KS">Kansas</option>
                        <option value="KY">Kentucky</option>
                        <option value="LA">Louisiana</option>
                        <option value="ME">Maine</option>
                        <option value="MD">Maryland</option>
                        <option value="MA">Massachusetts</option>
                        <option value="MI">Michigan</option>
                        <option value="MN">Minnesota</option>
                        <option value="MS">Mississippi</option>
                        <option value="MO">Missouri</option>
                        <option value="MT">Montana</option>
                        <option value="NE">Nebraska</option>
                        <option value="NV">Nevada</option>
                        <option value="NH">New Hampshire</option>
                        <option value="NJ">New Jersey</option>
                        <option value="NM">New Mexico</option>
                        <option value="NY">New York</option>
                        <option value="NC">North Carolina</option>
                        <option value="ND">North Dakota</option>
                        <option value="OH">Ohio</option>
                        <option value="OK">Oklahoma</option>
                        <option value="OR">Oregon</option>
                        <option value="PA">Pennsylvania</option>
                        <option value="RI">Rhode Island</option>
                        <option value="SC">South Carolina</option>
                        <option value="SD">South Dakota</option>
                        <option value="TN">Tennessee</option>
                        <option value="TX">Texas</option>
                        <option value="UT">Utah</option>
                        <option value="VT">Vermont</option>
                        <option value="VA">Virginia</option>
                        <option value="WA">Washington</option>
                        <option value="WV">West Virginia</option>
                        <option value="WI">Wisconsin</option>
                        <option value="WY">Wyoming</option>
                        <option value="DC">Washington DC</option>
                        <option value="PR">Puerto Rico</option>
                    </select>
                </div>
                
                <!-- Service Needed Dropdown -->
                <div class="form-group full-width">
                    <label><i class="fas fa-concierge-bell"></i> Service Needed <span class="required"></span></label>
                    <select id="service" required>
                        <option value="" disabled selected>Select your service</option>
                        <option value="Consultation">Consultation</option>
                        <option value="Travel Booking">Travel Booking</option>
                        <option value="Trip Planning">Trip Planning</option>
                        <option value="Group Travel">Group Travel</option>
                        <option value="Corporate Travel">Corporate Travel</option>
                        <option value="Luxury Travel">Luxury Travel</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                
                <!-- Best Time to Contact -->
                <div class="form-group">
                    <label><i class="fas fa-clock"></i> Best Time to Contact <span class="required"></span></label>
                    <div class="radio-group">
                        <label class="radio-label">
                            <input type="radio" name="time" value="Morning" required> Morning
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="time" value="Afternoon"> Afternoon
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="time" value="Evening"> Evening
                        </label>
                    </div>
                </div>
                
                <!-- Best Way to Contact -->
                <div class="form-group">
                    <label><i class="fas fa-comment"></i> Best Way to Contact <span class="required"></span></label>
                    <div class="radio-group">
                        <label class="radio-label">
                            <input type="radio" name="contact" value="Call" required> Call
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="contact" value="Text"> Text
                        </label>
                    </div>
                </div>
            </div>
            
            <!-- Referrer Information Section -->
            <div class="referrer-section">
                <h3><i class="fas fa-user-plus"></i> Who referred you?</h3>
                <div class="form-grid">
                    <div class="form-group">
                        <label><i class="fas fa-user"></i> Referrer Name</label>
                        <input type="text" id="referrerName" placeholder="Person who referred you">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-phone"></i> Referrer Phone</label>
                        <input type="tel" id="referrerPhone" placeholder="(555) 123-4567">
                    </div>
                </div>
            </div>
            
            <!-- Comments Box -->
            <div class="form-group full-width">
                <label><i class="fas fa-comment-dots"></i> Additional Comments (200 words max)</label>
                <textarea id="comments" placeholder="Tell us about your travel needs, special requests, or any questions you have..." maxlength="1000" oninput="updateCharCount()"></textarea>
                <div class="char-count"><span id="charCount">0</span>/1000 characters (approx. 200 words)</div>
            </div>
            
            <!-- CALL BUTTON - Always Visible -->
            <div class="button-container">
                <div class="section-divider">
                    <hr>
                    <span><i class="fas fa-phone-alt"></i> Quick Contact</span>
                    <hr>
                </div>
                
                <button type="button" class="action-button call-btn" onclick="makeCall()">
                    <i class="fas fa-phone-alt"></i> Call Jo-Ann Directly
                </button>
                
                <div class="section-divider">
                    <hr>
                    <span><i class="fas fa-paper-plane"></i> Submit Options</span>
                    <hr>
                </div>
                
                <!-- TWO BUTTONS - Client Request vs Referral -->
                <div class="button-group two-buttons">
                    <button type="button" class="action-button" onclick="submitClientRequest()">
                        <i class="fas fa-user-check"></i> Submit Form as Client Request
                    </button>
                    
                    <button type="button" class="action-button" onclick="submitReferral()">
                        <i class="fas fa-user-plus"></i> Submit Form as Referral
                    </button>
                </div>
                
                <p style="text-align: center; margin-top: 10px; font-size: 0.85rem; color: #70410a; opacity: 0.8;">
                    <i class="fas fa-info-circle"></i> Both options send to the same number but help us categorize your request
                </p>
            </div>
        </form>
    </div>
    
    <!-- Toast Notification -->
    <div class="toast" id="toast"></div>
    
    <script>
        const businessPhone = '5167701414';
        
        // Character count for comments
        function updateCharCount() {
            const comments = document.getElementById('comments');
            const charCount = document.getElementById('charCount');
            charCount.textContent = comments.value.length;
        }
        
        // Make call function
        function makeCall() {
            window.location.href = `tel:${businessPhone}`;
            showToast('Calling Jo-Ann... 📞');
        }
        
        // Get all form values helper
        function getFormData() {
            return {
                fullName: document.getElementById('fullName').value,
                phoneNumber: document.getElementById('phoneNumber').value,
                companyName: document.getElementById('companyName').value,
                state: document.getElementById('state').value,
                service: document.getElementById('service').value,
                bestTime: document.querySelector('input[name="time"]:checked')?.value || 'Not specified',
                bestContact: document.querySelector('input[name="contact"]:checked')?.value || 'Not specified',
                referrerName: document.getElementById('referrerName').value,
                referrerPhone: document.getElementById('referrerPhone').value,
                comments: document.getElementById('comments').value
            };
        }
        
        // Validate required fields
        function validateForm() {
            const data = getFormData();
            if (!data.fullName || !data.phoneNumber || !data.state || !data.service) {
                showToast('⚠️ Please fill in all required fields!');
                return false;
            }
            return true;
        }
        
        // Submit as Client Request
        function submitClientRequest() {
            if (!validateForm()) return;
            
            const data = getFormData();
            
            let message = '📋 NEW CLIENT REQUEST 📋\n\n';
            message += `👤 Client Name: ${data.fullName}\n`;
            message += `📱 Client Phone: ${data.phoneNumber}\n`;
            message += `🏢 Company: ${data.companyName || 'Not provided'}\n`;
            message += `📍 State: ${data.state}\n`;
            message += `🛎️ Service Needed: ${data.service}\n`;
            message += `⏰ Best Time: ${data.bestTime}\n`;
            message += `📞 Best Way: ${data.bestContact}\n\n`;
            
            if (data.referrerName || data.referrerPhone) {
                message += `👥 Referred By:\n`;
                if (data.referrerName) message += `   Name: ${data.referrerName}\n`;
                if (data.referrerPhone) message += `   Phone: ${data.referrerPhone}\n`;
            }
            
            if (data.comments) {
                message += `\n💬 Client Comments:\n${data.comments}\n`;
            }
            
            message += `\n📅 Submitted: ${new Date().toLocaleString()}`;
            message += `\n🔹 Type: Client Request`;
            
            const smsLink = `sms:${businessPhone}?body=${encodeURIComponent(message)}`;
            window.location.href = smsLink;
            
            showToast('📋 Opening SMS with CLIENT REQUEST data!');
        }
        
        // Submit as Referral
        function submitReferral() {
            if (!validateForm()) return;
            
            const data = getFormData();
            
            let message = '🤝 NEW REFERRAL SUBMISSION 🤝\n\n';
            message += `👤 Referred Person: ${data.fullName}\n`;
            message += `📱 Referred Phone: ${data.phoneNumber}\n`;
            message += `🏢 Company: ${data.companyName || 'Not provided'}\n`;
            message += `📍 State: ${data.state}\n`;
            message += `🛎️ Service Needed: ${data.service}\n`;
            message += `⏰ Best Time: ${data.bestTime}\n`;
            message += `📞 Best Way: ${data.bestContact}\n\n`;
            
            if (data.referrerName || data.referrerPhone) {
                message += `👥 REFERRER DETAILS:\n`;
                message += `   Name: ${data.referrerName || 'Not provided'}\n`;
                message += `   Phone: ${data.referrerPhone || 'Not provided'}\n`;
            } else {
                message += `👥 Referrer: Not specified (direct referral)\n`;
            }
            
            if (data.comments) {
                message += `\n💬 Additional Info:\n${data.comments}\n`;
            }
            
            message += `\n📅 Submitted: ${new Date().toLocaleString()}`;
            message += `\n🔹 Type: Referral`;
            
            const smsLink = `sms:${businessPhone}?body=${encodeURIComponent(message)}`;
            window.location.href = smsLink;
            
            showToast('🤝 Opening SMS with REFERRAL data!');
        }
        
        // Toast notification
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
        
        // Prevent form from submitting normally
        document.getElementById('referralForm').addEventListener('submit', function(e) {
            e.preventDefault();
        });
        
        // Add floating spotlight effect
        document.addEventListener('mousemove', function(e) {
            const x = e.clientX / window.innerWidth * 100;
            const y = e.clientY / window.innerHeight * 100;
            document.body.style.setProperty('--mouse-x', x + '%');
            document.body.style.setProperty('--mouse-y', y + '%');
        });
    </script>
</body>
</html>
